# LDAP User Manager - Nginx Configuration
# This file handles both root and sub-path deployment
#
# USAGE:
# 1. Copy this configuration to your Nginx sites-available directory
# 2. Set BASE_PATH to your deployment path:
#    - For root deployment: BASE_PATH = ""
#    - For sub-path deployment: BASE_PATH = "/ldap-manager" (without trailing slash)
# 3. Update server_name, root, and fastcgi_pass paths
# 4. Enable the site and reload Nginx

# CONFIGURATION: Set your deployment path here
# For root deployment: BASE_PATH = ""
# For sub-path deployment: BASE_PATH = "/ldap-manager" (without trailing slash)
# Examples:
# BASE_PATH = ""                    # Root deployment
# BASE_PATH = "/ldap-manager"       # Sub-path deployment
# BASE_PATH = "/apps/user-manager"  # Nested sub-path deployment

# IMPORTANT: Change this variable to your desired deployment path
set $base_path "";

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain
    root /var/www/ldap-user-manager/www;  # Adjust path to your installation
    index index.php index.html;

    # Security: Prevent access to sensitive files
    location ~* \.(htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
    }

    # Security: Prevent access to includes directory
    location ^~ /includes/ {
        deny all;
    }

    # Security: Prevent access to configuration files
    location ~ /\.(env|git|gitignore) {
        deny all;
    }

    # Handle trailing slashes
    rewrite ^/(.+)/$ /$1 permanent;

    # Clean URL: ${BASE_PATH}/manage/users/show → ${BASE_PATH}/manage/users/show.php
    location ~ ^${base_path}/manage/users/show/?$ {
        try_files /manage/users/show.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/users/new → ${BASE_PATH}/manage/users/new.php
    location ~ ^${base_path}/manage/users/new/?$ {
        try_files /manage/users/new.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/organizations/show → ${BASE_PATH}/manage/organizations/show/index.php
    location ~ ^${base_path}/manage/organizations/show/?$ {
        try_files /manage/organizations/show/index.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/organizations/add → ${BASE_PATH}/manage/organizations/add.php
    location ~ ^${base_path}/manage/organizations/add/?$ {
        try_files /manage/organizations/add.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/organizations/users/add → ${BASE_PATH}/manage/organizations/users/add.php
    location ~ ^${base_path}/manage/organizations/users/add/?$ {
        try_files /manage/organizations/users/add.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/roles → ${BASE_PATH}/manage/roles/index.php
    location ~ ^${base_path}/manage/roles/?$ {
        try_files /manage/roles/index.php =404;
    }

    # Clean URL: ${BASE_PATH}/manage/download → ${BASE_PATH}/manage/download.php
    location ~ ^${base_path}/manage/download/?$ {
        try_files /manage/download.php =404;
    }

    # Clean URL: ${BASE_PATH}/setup/ldap → ${BASE_PATH}/setup/ldap.php
    location ~ ^${base_path}/setup/ldap/?$ {
        try_files /setup/ldap.php =404;
    }

    # Clean URL: ${BASE_PATH}/setup/verify → ${BASE_PATH}/setup/verify.php
    location ~ ^${base_path}/setup/verify/?$ {
        try_files /setup/verify.php =404;
    }

    # Clean URL: ${BASE_PATH}/setup/run_checks → ${BASE_PATH}/setup/run_checks.php
    location ~ ^${base_path}/setup/run_checks/?$ {
        try_files /setup/run_checks.php =404;
    }

    # Clean URL: ${BASE_PATH}/change_password → ${BASE_PATH}/change_password/index.php
    location ~ ^${base_path}/change_password/?$ {
        try_files /change_password/index.php =404;
    }

    # Clean URL: ${BASE_PATH}/request_account → ${BASE_PATH}/request_account/index.php
    location ~ ^${base_path}/request_account/?$ {
        try_files /request_account/index.php =404;
    }

    # Clean URL: ${BASE_PATH}/log_out → ${BASE_PATH}/log_out/index.php
    location ~ ^${base_path}/log_out/?$ {
        try_files /log_out/index.php =404;
    }

    # Handle organization show URLs with parameters
    # ${BASE_PATH}/manage/organizations/show/CompanyName → ${BASE_PATH}/manage/organizations/show/index.php?org=CompanyName
    location ~ ^${base_path}/manage/organizations/show/([^/]+)/?$ {
        try_files /manage/organizations/show/index.php =404;
        fastcgi_param QUERY_STRING "org=$1";
    }

    # Handle user show URLs with parameters
    # ${BASE_PATH}/manage/users/show/username → ${BASE_PATH}/manage/users/show.php?user=username
    location ~ ^${base_path}/manage/users/show/([^/]+)/?$ {
        try_files /manage/users/show.php =404;
        fastcgi_param QUERY_STRING "user=$1";
    }

    # PHP processing for all paths
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.0-fpm.sock;  # Adjust PHP-FPM socket path
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Static file handling with caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf|zip|txt|xml|json)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Fallback: Only process non-existing URLs that don't match static file patterns
    # This should be the last location block and should NOT catch static files
    location / {
        if ($base_path != "") {
            # Sub-path deployment: try static files first, then PHP
            try_files $uri $uri/ ${base_path}/index.php?$args;
        }
        if ($base_path = "") {
            # Root deployment: try static files first, then PHP
            try_files $uri $uri/ /index.php?$args;
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
