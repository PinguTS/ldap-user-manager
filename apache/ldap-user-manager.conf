# LDAP User Manager - Apache Configuration
# This configuration provides clean URLs, security, and performance optimizations

# Security: Prevent access to sensitive files
<FilesMatch "\.(htaccess|htpasswd|ini|log|sh|sql|conf)$">
    Order Allow,Deny
    Deny from all
</FilesMatch>

# Security: Prevent access to includes directory
<Directory "/opt/ldap_user_manager/includes">
    Require all denied
</Directory>

# Security: Prevent access to configuration files
<Files ".env,.git,.gitignore">
    Require all denied
</Files>

# Performance and caching for static files
<IfModule mod_expires.c>
    ExpiresActive On

    # CSS and JavaScript files
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"

    # Images
    ExpiresByType image/png "access plus 1 month"
    ExpiresByType image/jpg "access plus 1 month"
    ExpiresByType image/jpeg "access plus 1 month"
    ExpiresByType image/gif "access plus 1 month"
    ExpiresByType image/svg+xml "access plus 1 month"

    # Fonts
    ExpiresByType font/woff "access plus 1 month"
    ExpiresByType font/woff2 "access plus 1 month"
    ExpiresByType application/font-woff "access plus 1 month"
    ExpiresByType application/font-woff2 "access plus 1 month"
</IfModule>

# Compression
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE application/xml
    AddOutputFilterByType DEFLATE application/xhtml+xml
    AddOutputFilterByType DEFLATE application/rss+xml
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/x-javascript
</IfModule>

# Security headers
<IfModule mod_headers.c>
    # Prevent clickjacking
    Header always append X-Frame-Options SAMEORIGIN

    # Prevent MIME type sniffing
    Header always set X-Content-Type-Options nosniff

    # Enable XSS protection
    Header always set X-XSS-Protection "1; mode=block"

    # Referrer policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# URL Rewriting - only apply to the DocumentRoot
<Directory "/opt/ldap_user_manager">
    # Enable URL rewriting
    RewriteEngine On
    
    # Handle trailing slashes for directories
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.+)/$ /$1 [R=301,L]

    # Clean URL: /manage/users/show → /manage/users/show.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/users/show/?$ /manage/users/show.php [L]

    # Clean URL: /manage/users/new → /manage/users/new.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/users/new/?$ /manage/users/new.php [L]

    # Clean URL: /manage/organizations/show → /manage/organizations/show/index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/organizations/show/?$ /manage/organizations/show/index.php [L]

    # Clean URL: /manage/organizations/add → /manage/organizations/add.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/organizations/add/?$ /manage/organizations/add.php [L]

    # Clean URL: /manage/organizations/users/add → /manage/organizations/users/add.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/organizations/users/add/?$ /manage/organizations/users/add.php [L]

    # Clean URL: /manage/roles → /manage/roles/index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/roles/?$ /manage/roles/index.php [L]

    # Clean URL: /manage/download → /manage/download.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/download/?$ /manage/download.php [L]

    # Clean URL: /setup/ldap → /setup/ldap.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^setup/ldap/?$ /setup/ldap.php [L]

    # Clean URL: /setup/verify → /setup/verify.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^setup/verify/?$ /setup/verify.php [L]

    # Clean URL: /setup/run_checks → /setup/run_checks.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^setup/run_checks/?$ /setup/run_checks.php [L]

    # Clean URL: /change_password → /change_password/index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^change_password/?$ /change_password/index.php [L]

    # Clean URL: /request_account → /request_account/index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^request_account/?$ /request_account/index.php [L]

    # Clean URL: /log_out → /log_out/index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^log_out/?$ /log_out/index.php [L]

    # Handle organization show URLs with parameters
    # /manage/organizations/show/CompanyName → /manage/organizations/show/index.php?org=CompanyName
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/organizations/show/([^/]+)/?$ /manage/organizations/show/index.php?org=$1 [L,QSA]

    # Handle user show URLs with parameters
    # /manage/users/show/username → /manage/users/show.php?user=username
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^manage/users/show/([^/]+)/?$ /manage/users/show.php?user=$1 [L,QSA]

    # Fallback: Only rewrite non-existing URLs that don't match static file patterns
    # This should be the last rule and should NOT catch static files
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf|zip|txt|xml|json)$
    RewriteRule ^(.*)$ /index.php [L]
</Directory>
