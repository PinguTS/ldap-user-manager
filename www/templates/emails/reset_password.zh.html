Subject: [安全提示] {organisation} 账户：已请求密码重置

<p>您好：</p>
<p>有人请求重置您的 <strong>{organisation}</strong> 账户 (<strong>{login}</strong>) 的密码。</p>
<div style="background:#f8f9fa; border:1px solid #dee2e6; border-radius:4px; padding:15px; margin:20px 0;">
    <p style="margin-top:0; font-size:14px; color:#495057;">要设置新密码，请点击下方按钮。此链接的有效期为 <strong>{token_expires_human}</strong>。</p>
    <table role="presentation" cellpadding="0" cellspacing="0">
        <tr><td style="background-color:#0d6efd; border-radius:6px;"><a href="{password_reset_url}" style="display:inline-block; padding:12px 28px; color:#ffffff; text-decoration:none; font-weight:600; font-family:sans-serif; font-size:15px;">设置新密码</a></td></tr>
    </table>
</div>
<p style="font-size:12px; color:#888; word-break:break-all;">如果按钮无法点击，请将以下链接复制并粘贴到浏览器中：<br>{password_reset_url}</p>
<p><strong>安全提示：</strong> 如果您<strong>并未</strong>请求重置密码，请忽略此邮件。您的密码不会被更改。</p>
